<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles/signup.css">
</head>
<body>
    <navbar >
        <div class="navbar navbar-expand-lg navbar-dark custom-bg">
            <div class="container">
                <a class="navbar-brand fw-bold " href="../pages/index.html" > <i class="bi bi-fork-knife"></i> FoodHub</a>

                <button  class="btn btn-dark ms-auto"> <i class="bi bi-sun "></i> </button>
            </div>
            
        </div>
    </navbar>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div >
            <div class="card shadow align-item-center w-100"  style="max-width: 700px;">
                <div class="card-body text-center">
                    <h2> Welcome </h2>
                    <form id="Signup">

                        <div class="row mb-3">
                            <div class="col-lg-6 mt-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person-circle"></i></span> 
                                    <input class="form-control" type="text" id="name" placeholder="Enter the name" required>
                                    <div class="invalid-feedback">Name must be character </div>
                                </div>
                            </div>

                            <div class="col-lg-6 mt-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar"></i></span> 
                                    <input class="form-control" id="dob" type="date" required>
                                    <div class="invalid-feedback"> Enter the DOB </div>
                                </div>
                            </div>
                        </div>                       


                        <div class="row mb-3">
                            <div class="col-lg-6 mt-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span> 
                                    <input class="form-control" type="email" id="email" placeholder="Enter the email" required>
                                    <div class="invalid-feedback"> Enter valid email id </div>
                                </div>
                            </div>

                            <div class="col-lg-6 mt-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-telephone-fill"></i></span> 
                                    <input class="form-control" type="number" id="phone" placeholder="Enter Phone number" required>
                                    <div class="invalid-feedback">Enter valid phone number </div>
                                </div>
                            </div>
                        </div>
 
                        <div class="row mb-3">
                            <div class="col-lg-6 mt-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span> 
                                    <input class="form-control" type="password" id="password" placeholder="Enter password" required>
                                    <div class="invalid-feedback">The password must contain uppercase,lowercase, digit, special characters  </div>
                                </div>
                            </div>

                            <div class="col-lg-6 mt-3">
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-lock-fill"></i></span> 
                                    <input class="form-control" type="password" id="confirmPassword" placeholder="Confirm Password" required>
                                    <div class="invalid-feedback">Must match the created password  </div>
                                </div>
                            </div>
                        </div>

                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-geo-alt-fill"></i></span>
                            <textarea class="form-control" id="address" type="text" rows="3" cols="30" placeholder="Enter your address...." required></textarea>
                            <div class="invalid-feedback">Address must be greater than 15 characters</div>

                        </div>

                        <div class="mt-3">
                            <button type="submit" class="btn btn-primary w-100">
                                Register
                            </button>
                        </div>

                        <div class="text-center mt-3">
                            <p class="mb-0">Do you have an account? 
                                <a href="../pages/login.html" class="fw-semibold" >
                                    Login
                                </a>
                            </p>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../scripts/signup.js"></script>
</body>
</html>
