<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <navbar >
        <div class="navbar navbar-expand-lg navbar-dark custom-bg">
            <div class="container">
                <a class="navbar-brand fw-bold " href="../pages/index.html" > <i class="bi bi-fork-knife"></i> FoodHub</a>

                <button  class="btn btn-dark ms-auto"> <i class="bi bi-sun "></i> </button>
            </div>
            
        </div>
    </navbar>
    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div >
            <div class="card shadow align-item-center w-100 rounded"  style="max-width: 700px;">
                <div class="card-body text-center">
                    <h2> Welcome </h2>
                    <p>Login </p>
                    <form id="login">
                        <div class="input-group mb-3">
                            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span> 
                            <input class="form-control" type="email" placeholder="Enter the email">
                            <div class="invalid-feedback"> Enter valid email id </div>
                        </div>

                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span> 
                            <input class="form-control" type="text" placeholder="Confirm Password">
                            <div class="invalid-feedback">Must match the created password </div>
                        </div>

                        <div class="text-center mt-3">
                            <p class="mb-0">Not yet Registered? 
                                <a href="../pages/signup.html" class="fw-semibold" >
                                    Login
                                </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src=""></script>
</body>
</html>
