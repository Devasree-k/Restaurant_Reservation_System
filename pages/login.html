<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/login.css">
</head>
<body>
    <!-- Navbar -->
    <navbar >
        <div class="navbar navbar-expand-lg navbar-dark custom-bg">
            <div class="container">
                <a class="navbar-brand fw-bold " href="../pages/index.html" > <i class="bi bi-fork-knife"></i> FoodHub</a>

                <button  class="btn btn-dark ms-auto" id="themeToggle"> <i class="bi bi-sun "></i> </button>
            </div>
            
        </div>
    </navbar>
    <div class="container-fluid login-container">
    <div class="row shadow-lg login-card">

        <!-- Left Side -->
        <div class="col-lg-6 image-section">
            <img src="../assets/images/login.webp"
                 class="img-fluid login-image"
                 alt="Restaurant">
        </div>

        <!-- Right Side -->
        <div class="col-lg-6 form-section">
            <div class="login-box">
                <h2 class="fw-bold">Welcome</h2>
                <p class="text-muted">
                    Login to continue your FoodHub account
                </p>

                <form id="login">

                    <div class="input-group mb-3">
                        <span class="input-group-text">
                            <i class="bi bi-envelope-fill"></i>
                        </span>
                        <input  type="email" class="form-control" id="email" placeholder="Enter Email"  required>
                        <div class="invalid-feedback">
                            Enter valid email
                        </div>
                    </div>

                    <div class="input-group mb-4">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input type="password" class="form-control" id="password" placeholder="Enter Password" required>
                        <div class="invalid-feedback">
                            Enter valid Password
                        </div>
                    </div>

                    <button
                        type="submit" class="btn custom-bg text-white w-100">
                        Login
                    </button>

                </form>

                <div class="text-center mt-4">
                    <p>
                        Not yet Registered?
                        <a href="../pages/signup.html">
                            Sign Up
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.25/dist/sweetalert2.all.min.js"></script>
    <script src="../scripts/login.js"></script>
    <script>
        const themeBtn = document.getElementById("themeToggle");
        if(localStorage.getItem("theme") === "dark"){
            document.body.classList.add("dark-mode");
            themeBtn.innerHTML='<i class="bi bi-sun-fill"></i>';
        }
        themeBtn.addEventListener("click",function(){
            document.body.classList.toggle("dark-mode");
            if(document.body.classList.contains("dark-mode")){
                localStorage.setItem("theme","dark");
                themeBtn.innerHTML='<i class="bi bi-sun-fill"></i>';
            }
            else{
                localStorage.setItem("theme","light");
                themeBtn.innerHTML='<i class="bi bi-moon-stars-fill"></i>';
            }
        });
    </script>
</body>
</html>
